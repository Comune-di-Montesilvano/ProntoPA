# docker-compose.override.yml — SVILUPPO LOCALE
#
# Caricato automaticamente da Docker Compose insieme a docker-compose.yml.
# Aggiunge bind mount per hot-reload del codice e tool extra (Adminer, Mailpit).
#
# Non usare in produzione.

services:

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: pronto-pa-dev:local
    volumes:
      - ./:/var/www/html
    environment:
      PHP_OPCACHE_ENABLE: 0

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mariadb
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - mariadb
    networks:
      - prontoPA
    profiles:
      - dev

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - prontoPA
    profiles:
      - dev
