# docker-compose.override.yml — SVILUPPO LOCALE
#
# Caricato automaticamente da Docker Compose sopra docker-compose.yml.
# Sovrascrive immagini con build locale, aggiunge bind mount e tool dev.
#
# Avvio: docker compose up -d
# Con Adminer e Mailpit: docker compose --profile dev up -d

services:

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./:/var/www/html
      - ./public/storage:/var/www/html/public/storage
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    restart: "no"

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: pronto-pa-dev:local
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
      - ./public/storage:/var/www/html/public/storage
    environment:
      PHP_OPCACHE_ENABLE: 0
    restart: "no"

  mariadb:
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    restart: "no"

  redis:
    restart: "no"

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mariadb
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - mariadb
    networks:
      - prontoPA
    profiles:
      - dev

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - prontoPA
    profiles:
      - dev
