name: Build & Publish Docker Images

# dev branch  → build sempre, tag immagine: "dev"
# tag v*.*.* → build + tag semver + "latest"

on:
  push:
    branches:
      - dev
    tags:
      - "v*.*.*"

env:
  IMAGE_APP: ghcr.io/comune-di-montesilvano/pronto-pa
  IMAGE_WEB: ghcr.io/comune-di-montesilvano/pronto-pa-web

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute APP_VERSION
        id: vars
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Metadata per entrambe le immagini ───────────────────────────────────

      - name: Docker metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_APP }}
          bake-target: app
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Docker metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          bake-target: web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      # ── Build & push entrambe le immagini in parallelo (bake) ───────────────
      # Builder stage gira una sola volta; app e web buildate in parallelo.
      # Cache scope separati per target (definiti in docker-bake.hcl).

      - name: Build & push (bake)
        uses: docker/bake-action@v5
        with:
          files: |
            ./docker-bake.hcl
            ${{ steps.meta-app.outputs.bake-file }}
            ${{ steps.meta-web.outputs.bake-file }}
          push: true
          set: |
            app.args.APP_VERSION=${{ steps.vars.outputs.version }}
            web.args.APP_VERSION=${{ steps.vars.outputs.version }}
