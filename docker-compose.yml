# docker-compose.yml — SVILUPPO LOCALE
#
# Usare questo file per lo sviluppo con bind mount e hot-reload.
# Include Adminer e Mailpit per comodità.
#
# Avvio: docker compose up -d
# Per Adminer e Mailpit: docker compose --profile dev up -d

services:

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - php
    networks:
      - prontoPA

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: pronto-pa-dev:local
    volumes:
      - ./:/var/www/html
    environment:
      PHP_OPCACHE_ENABLE: 0
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - prontoPA

  mariadb:
    image: mariadb:10.11
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MARIADB_DATABASE: ${DB_DATABASE:-segnalazioni}
      MARIADB_USER: ${DB_USERNAME:-segnalazioni}
      MARIADB_PASSWORD: ${DB_PASSWORD:-segnalazioni_secret}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prontoPA

  redis:
    image: redis:7.2-alpine
    volumes:
      - redis_data:/data
    networks:
      - prontoPA

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mariadb
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - mariadb
    networks:
      - prontoPA
    profiles:
      - dev

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - prontoPA
    profiles:
      - dev

volumes:
  mariadb_data:
  redis_data:

networks:
  prontoPA:
    driver: bridge
