# docker-compose.yml — PRODUZIONE
#
# Nessun bind mount. Il codice è copiato dentro le immagini Docker.
# Usare per Portainer stack / rootless Podman.
#
# Immagini: ghcr.io/comune-di-montesilvano/pronto-pa (php-fpm)
#           ghcr.io/comune-di-montesilvano/pronto-pa-web (nginx)
#
# Avvio: docker compose up -d
# Dev (con override): docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#   oppure semplicemente: docker compose up -d  (override caricato automaticamente)

services:

  nginx:
    image: ghcr.io/comune-di-montesilvano/pronto-pa-web:${APP_VERSION:-latest}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - uploads:/var/www/html/public/storage:ro
      - nginx_ssl:/etc/nginx/ssl:ro
    depends_on:
      - php
    networks:
      - prontoPA
    restart: unless-stopped

  php:
    image: ghcr.io/comune-di-montesilvano/pronto-pa:${APP_VERSION:-latest}
    volumes:
      - app_storage:/var/www/html/storage
      - uploads:/var/www/html/storage/app/public
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Rome}
      APP_LOCALE: ${APP_LOCALE:-it}
      APP_VERSION: ${APP_VERSION:-latest}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-error}
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-segnalazioni}
      DB_USERNAME: ${DB_USERNAME:-segnalazioni}
      DB_PASSWORD: ${DB_PASSWORD}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ProntoPA}
      PEC_HOST: ${PEC_HOST}
      PEC_PORT: ${PEC_PORT:-465}
      PEC_USERNAME: ${PEC_USERNAME}
      PEC_PASSWORD: ${PEC_PASSWORD}
      PEC_ENCRYPTION: ${PEC_ENCRYPTION:-ssl}
      WEBHOOK_CITTADINI_URL: ${WEBHOOK_CITTADINI_URL}
      WEBHOOK_CITTADINI_SECRET: ${WEBHOOK_CITTADINI_SECRET}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-480}
      SESSION_COOKIE: ${SESSION_COOKIE:-prontoPA_session}
      PHP_OPCACHE_ENABLE: 1
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - prontoPA
    restart: unless-stopped

  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MARIADB_DATABASE: ${DB_DATABASE:-segnalazioni}
      MARIADB_USER: ${DB_USERNAME:-segnalazioni}
      MARIADB_PASSWORD: ${DB_PASSWORD:-segnalazioni_secret}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prontoPA
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    volumes:
      - redis_data:/data
    networks:
      - prontoPA
    restart: unless-stopped

volumes:
  mariadb_data:
  redis_data:
  app_storage:
  uploads:
  nginx_ssl:

networks:
  prontoPA:
    driver: bridge
